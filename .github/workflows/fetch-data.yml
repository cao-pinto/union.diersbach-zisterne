name: Shelly Daten abrufen

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Status vom Shelly-Cloud-API holen
        env:
          SHELLY_HOST: ${{ secrets.SHELLY_HOST }}
          SHELLY_AUTH_KEY: ${{ secrets.SHELLY_AUTH_KEY }}
        run: |
          curl -s -X POST "${SHELLY_HOST}/v2/devices/api/get?auth_key=${SHELLY_AUTH_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"ids":["2cbcbb2d4f60","8c4f008f23cc"],"select":["status"]}' \
            -o raw_response.json

          cat raw_response.json

      - name: Kalibrieren und data.json schreiben
        run: |
          RAW=$(jq --arg cid "2cbcbb2d4f60" '.[] | select(.id==$cid) | .status["input:100"].percent' raw_response.json)
          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Gleitenden Mittelwert Ăźber die letzten 10 Rohwerte bilden (20 Min bei 2-Min-Takt, glĂ¤ttet Spritzer-AusreiĂer)
          if [ ! -f raw_window.json ]; then
            echo "[]" > raw_window.json
          fi
          jq --argjson raw "$RAW" '. + [$raw] | if length > 10 then .[-10:] else . end' \
            raw_window.json > raw_window_new.json
          mv raw_window_new.json raw_window.json
          RAW_AVG=$(jq 'add/length' raw_window.json)

          # Zentrale Kalibrierformel: (x-1)/(48-1)*100, geclampt auf 0-100, auf Basis des Mittelwerts
          CALIBRATED=$(jq -n --argjson raw "$RAW_AVG" '
            (($raw - 1) / (48 - 1) * 100) as $calc
            | if $calc < 0 then 0 elif $calc > 100 then 100 else $calc end
          ')

          # Pumpenstatus (true/false), Fallback auf false falls Kanal nicht erreichbar
          PUMP1=$(jq --arg pid "8c4f008f23cc" '(.[] | select(.id==$pid) | .status["switch:0"].output) // false' raw_response.json)
          PUMP2=$(jq --arg pid "8c4f008f23cc" '(.[] | select(.id==$pid) | .status["switch:1"].output) // false' raw_response.json)

          echo "Roh: $RAW  Gemittelt: $RAW_AVG  Kalibriert: $CALIBRATED  Pumpe1: $PUMP1  Pumpe2: $PUMP2"

          jq -n \
            --argjson percent "$CALIBRATED" \
            --argjson raw "$RAW" \
            --arg updated "$UPDATED" \
            --argjson pump1 "$PUMP1" \
            --argjson pump2 "$PUMP2" \
            '{
              cistern_percent: $percent,
              cistern_raw: $raw,
              last_updated: $updated,
              pumps: {
                pump1: {name: "Pumpe Vorne", on: $pump1},
                pump2: {name: "Pumpe Hinten", on: $pump2}
              }
            }' > data.json

          cat data.json

          # FĂźr die nĂ¤chsten Schritte merken
          echo "CALIBRATED=$CALIBRATED" >> $GITHUB_ENV
          echo "UPDATED=$UPDATED" >> $GITHUB_ENV

      - name: An Grafana Cloud pushen
        env:
          GRAFANA_METRICS_URL: ${{ secrets.GRAFANA_METRICS_URL }}
          GRAFANA_METRICS_USER: ${{ secrets.GRAFANA_METRICS_USER }}
          GRAFANA_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
        run: |
          curl -s -w "\nHTTP-Status: %{http_code}\n" -X POST \
            -H "Authorization: Bearer ${GRAFANA_METRICS_USER}:${GRAFANA_API_KEY}" \
            -H "Content-Type: text/plain" \
            "${GRAFANA_METRICS_URL}" \
            --data-raw "cistern,sensor=fillstand percent=${CALIBRATED}"

      - name: Ănderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json raw_window.json
          git diff --staged --quiet || git commit -m "Daten aktualisiert"
          git push
