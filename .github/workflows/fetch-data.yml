name: Shelly Daten abrufen

on:
  schedule:
    - cron: '7,17,27,37,47,57 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Status vom Shelly-Cloud-API holen
        env:
          SHELLY_HOST: ${{ secrets.SHELLY_HOST }}
          SHELLY_AUTH_KEY: ${{ secrets.SHELLY_AUTH_KEY }}
        run: |
          curl -s -X POST "${SHELLY_HOST}/v2/devices/api/get?auth_key=${SHELLY_AUTH_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"ids":["2cbcbb2d4f60"],"select":["status"]}' \
            -o raw_response.json

          cat raw_response.json

      - name: Kalibrieren und data.json schreiben
        run: |
          RAW=$(jq '.[0].status["input:100"].percent' raw_response.json)
          UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Zentrale Kalibrierformel: (x-1)/(48-1)*100, geclampt auf 0-100
          CALIBRATED=$(jq -n --argjson raw "$RAW" '
            (($raw - 1) / (48 - 1) * 100) as $calc
            | if $calc < 0 then 0 elif $calc > 100 then 100 else $calc end
          ')

          echo "Roh: $RAW  Kalibriert: $CALIBRATED"

          jq -n \
            --argjson percent "$CALIBRATED" \
            --argjson raw "$RAW" \
            --arg updated "$UPDATED" \
            '{
              cistern_percent: $percent,
              cistern_raw: $raw,
              last_updated: $updated,
              pumps: {
                pump1: "not_configured",
                pump2: "not_configured"
              }
            }' > data.json

          cat data.json

          # Für die nächsten Schritte merken
          echo "CALIBRATED=$CALIBRATED" >> $GITHUB_ENV
          echo "UPDATED=$UPDATED" >> $GITHUB_ENV

      - name: An Grafana Cloud pushen
        env:
          GRAFANA_METRICS_URL: ${{ secrets.GRAFANA_METRICS_URL }}
          GRAFANA_METRICS_USER: ${{ secrets.GRAFANA_METRICS_USER }}
          GRAFANA_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
        run: |
          curl -s -w "\nHTTP-Status: %{http_code}\n" -X POST \
            -H "Authorization: Bearer ${GRAFANA_METRICS_USER}:${GRAFANA_API_KEY}" \
            -H "Content-Type: text/plain" \
            "${GRAFANA_METRICS_URL}" \
            --data-raw "cistern,sensor=fillstand percent=${CALIBRATED}"

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Daten aktualisiert"
          git push
